name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,pulse]"

      - name: Contracts
        run: python scripts/check_contracts.py

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy src tests scripts

      - name: Tests
        run: pytest
